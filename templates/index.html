<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
</head>
<body>
<h1>PDF merger tool</h1>
<form method="post" action="/" enctype="multipart/form-data">
    <div class="mb-3" style="width: 350px">
        <label for="file_name" class="form-label">Put PDF file</label>
        <input name="file" type="file" id="file_name" class="form-control"/>
        <button type="submit" class="mt-2 btn btn-primary">Send file</button>
    </div>
</form>
{% for file in list_of_pdf %}
    <p class="text-success">File {{ file.path.name }} has {{ file.pages }} pages</p>
    <div>
        <a href="/delete/{{ file['path'].name }}" class="link-danger">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-filetype-pdf" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M14 4.5V14a2 2 0 0 1-2 2h-1v-1h1a1 1 0 0 0 1-1V4.5h-2A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v9H2V2a2 2 0 0 1 2-2h5.5zM1.6 11.85H0v3.999h.791v-1.342h.803q.43 0 .732-.173.305-.175.463-.474a1.4 1.4 0 0 0 .161-.677q0-.375-.158-.677a1.2 1.2 0 0 0-.46-.477q-.3-.18-.732-.179m.545 1.333a.8.8 0 0 1-.085.38.57.57 0 0 1-.238.241.8.8 0 0 1-.375.082H.788V12.48h.66q.327 0 .512.181.185.183.185.522m1.217-1.333v3.999h1.46q.602 0 .998-.237a1.45 1.45 0 0 0 .595-.689q.196-.45.196-1.084 0-.63-.196-1.075a1.43 1.43 0 0 0-.589-.68q-.396-.234-1.005-.234zm.791.645h.563q.371 0 .609.152a.9.9 0 0 1 .354.454q.118.302.118.753a2.3 2.3 0 0 1-.068.592 1.1 1.1 0 0 1-.196.422.8.8 0 0 1-.334.252 1.3 1.3 0 0 1-.483.082h-.563zm3.743 1.763v1.591h-.79V11.85h2.548v.653H7.896v1.117h1.606v.638z"/>
        </svg>Delete</a>
    </div>
{% endfor %}
<form method="post" action="/merge">
    <button type="submit" class="mt-2 btn btn-success">Merge files</button>
</form>
<form method="post" action="/clear">
    <button type="submit" class="mt-2 btn btn-secondary">Delete all</button>
</form>
{% for message in get_flashed_messages() %}
    <p class="text-warning h6">{{ message }}</p>
{% endfor %}
</body>
</html>
